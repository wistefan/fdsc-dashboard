<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FDSC Dashboard</title>
    <!--
      Runtime auth configuration. Loaded *before* the application bundle so
      that `window.__AUTH_CONFIG__` is populated by the time
      `src/auth/config.ts#loadAuthConfig()` runs. In production the BFF
      server dynamically serves this file from the AUTH_CONFIG_JSON env var
      (see server/src/runtime-config.ts); in local development it is a
      no-op stub that leaves the fallback path (`VITE_AUTH_PROVIDERS`) active.
    -->
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
