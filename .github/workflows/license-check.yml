name: License Header Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license-check:
    name: Verify license headers
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Verify license headers
        run: npm run license:check
