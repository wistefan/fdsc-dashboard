name: Release

# On every merge to `main`, compute the new semantic version from the merged
# PR's bump label, push a multi-arch docker image tagged with the version,
# create an annotated git tag, promote the release-notes file, regenerate
# `RELEASE-NOTES.md`, and publish a GitHub Release.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

env:
  IMAGE_REGISTRY: quay.io
  IMAGE_NAME: seamware/fdsc-dashboard
  BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  release:
    name: Tag, build, and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token with `contents:write` so the workflow can push the
          # generated release-notes commit and tags.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve merged PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: sha,
            });
            const merged = prs.find(p => p.merged_at);
            if (!merged) {
              core.setFailed(`No merged PR found for commit ${sha}`);
              return;
            }
            core.setOutput('number', merged.number);
            core.setOutput('labels', merged.labels.map(l => l.name).join(','));
            // Expose PR body via a file to avoid quoting headaches with
            // multi-line env vars containing backticks and quotes.
            const fs = require('fs');
            fs.writeFileSync('/tmp/pr-body.md', merged.body || '');

      - name: Determine bump label
        id: label
        env:
          PR_LABELS: ${{ steps.pr.outputs.labels }}
        run: |
          bump="$(bash .github/scripts/check-labels.sh "$PR_LABELS")"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        run: |
          version="$(bash .github/scripts/compute-next-version.sh '${{ steps.label.outputs.bump }}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next version: $version"

      - name: Extract release notes
        id: notes
        run: |
          notes_path="$(bash .github/scripts/extract-release-notes.sh '${{ steps.version.outputs.version }}' /tmp/pr-body.md)"
          echo "path=$notes_path" >> "$GITHUB_OUTPUT"

      - name: Update release-notes index
        run: |
          bash .github/scripts/update-release-notes-index.sh

      - name: Commit release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add RELEASE-NOTES.md release-notes/
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): notes for v${VERSION}"
            git push origin main
          else
            echo "No release-notes changes to commit."
          fi

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
