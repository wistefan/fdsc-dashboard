name: PR Docker Build

# Builds a multi-arch docker image for every PR synchronization. The resulting
# image is tagged `<nextVersion>-PRE-<shortSha>` so pre-release artefacts are
# easy to distinguish from production releases.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled

permissions:
  contents: read
  pull-requests: read

env:
  IMAGE_REGISTRY: quay.io
  IMAGE_NAME: seamware/fdsc-dashboard
  # Platforms that `docker/build-push-action` will build for.
  BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build & push PR image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch all tags so `compute-next-version.sh` can discover the latest
          # release tag.
          fetch-depth: 0

      - name: Determine bump label
        id: label
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          bump="$(bash .github/scripts/check-labels.sh "$PR_LABELS")"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        run: |
          version="$(bash .github/scripts/compute-next-version.sh '${{ steps.label.outputs.bump }}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          short_sha="${SHA:0:7}"
          # `-PRE-` marker makes the pre-release artefact easily identifiable
          # (matches the convention requested in the ticket description).
          echo "tag=${VERSION}-PRE-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### :package: PR Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
