version: "3.8"

services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    # Point the nginx reverse-proxy at the mock backends on the compose
    # network.  NGINX_*_UPSTREAM vars feed into default.conf.template via
    # 15-set-nginx-env.envsh.  TIL_API_URL etc. are intentionally left
    # unset so the frontend falls back to the /api/<svc> proxy paths
    # (the browser cannot resolve Docker-internal hostnames).
    environment:
      NGINX_TIL_UPSTREAM: http://mock-til:80
      NGINX_TIR_UPSTREAM: http://mock-tir:80
      NGINX_CCS_UPSTREAM: http://mock-ccs:80
      NGINX_ODRL_UPSTREAM: http://mock-odrl:80
    depends_on:
      - mock-til
      - mock-tir
      - mock-ccs
      - mock-odrl

  # Mock backend services using a lightweight HTTP stub.
  # In production these are replaced by the real services.
  # Each mock returns empty collections so the UI can render.

  mock-til:
    image: nginx:alpine
    volumes:
      - ./mocks/til:/usr/share/nginx/html:ro
      - ./mocks/til-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-tir:
    image: nginx:alpine
    volumes:
      - ./mocks/tir:/usr/share/nginx/html:ro
      - ./mocks/tir-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-ccs:
    image: nginx:alpine
    volumes:
      - ./mocks/ccs:/usr/share/nginx/html:ro
      - ./mocks/ccs-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-odrl:
    image: nginx:alpine
    volumes:
      - ./mocks/odrl:/usr/share/nginx/html:ro
      - ./mocks/odrl-nginx.conf:/etc/nginx/conf.d/default.conf:ro
