version: "3.8"

services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./nginx-docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mock-til
      - mock-tir
      - mock-ccs
      - mock-odrl
      - mock-apisix-dashboard

  # Mock backend services using a lightweight HTTP stub.
  # In production these are replaced by the real services.
  # Each mock returns empty collections so the UI can render.

  mock-til:
    image: nginx:alpine
    volumes:
      - ./mocks/til:/usr/share/nginx/html:ro
      - ./mocks/til-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-tir:
    image: nginx:alpine
    volumes:
      - ./mocks/tir:/usr/share/nginx/html:ro
      - ./mocks/tir-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-ccs:
    image: nginx:alpine
    volumes:
      - ./mocks/ccs:/usr/share/nginx/html:ro
      - ./mocks/ccs-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-odrl:
    image: nginx:alpine
    volumes:
      - ./mocks/odrl:/usr/share/nginx/html:ro
      - ./mocks/odrl-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # Mock Apisix Dashboard — serves a placeholder HTML page at
  # /apisix-dashboard/ so the iframe integration can be exercised
  # locally without a full OIDC IdP + Apisix stack.
  mock-apisix-dashboard:
    image: nginx:alpine
    volumes:
      - ./mocks/apisix-dashboard:/usr/share/nginx/html/apisix-dashboard:ro
      - ./mocks/apisix-dashboard-nginx.conf:/etc/nginx/conf.d/default.conf:ro
