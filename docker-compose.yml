version: "3.8"

services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    # Runtime API URL configuration (optional).
    # When set, these override the default nginx proxy paths (/api/<service>).
    # When unset or empty, the dashboard uses the nginx reverse-proxy routes
    # defined in the nginx config, which is the correct setup for this
    # docker-compose stack where mock backends are on the internal network.
    # environment:
    #   TIL_API_URL: http://custom-til:8080
    #   TIR_API_URL: http://custom-tir:8080
    #   CCS_API_URL: http://custom-ccs:8080
    #   ODRL_API_URL: http://custom-odrl:8080
    volumes:
      - ./nginx-docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mock-til
      - mock-tir
      - mock-ccs
      - mock-odrl

  # Mock backend services using a lightweight HTTP stub.
  # In production these are replaced by the real services.
  # Each mock returns empty collections so the UI can render.

  mock-til:
    image: nginx:alpine
    volumes:
      - ./mocks/til:/usr/share/nginx/html:ro
      - ./mocks/til-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-tir:
    image: nginx:alpine
    volumes:
      - ./mocks/tir:/usr/share/nginx/html:ro
      - ./mocks/tir-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-ccs:
    image: nginx:alpine
    volumes:
      - ./mocks/ccs:/usr/share/nginx/html:ro
      - ./mocks/ccs-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-odrl:
    image: nginx:alpine
    volumes:
      - ./mocks/odrl:/usr/share/nginx/html:ro
      - ./mocks/odrl-nginx.conf:/etc/nginx/conf.d/default.conf:ro
