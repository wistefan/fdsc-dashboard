services:
  dashboard:
    build: .
    ports:
      - "8080:3000"
    # Point the BFF proxy at the mock backends on the compose network.
    # The BFF forwards /api/{til,tir,ccs,odrl}/* to these upstream URLs.
    environment:
      TIL_API_URL: http://mock-til:80
      TIR_API_URL: http://mock-tir:80
      CCS_API_URL: http://mock-ccs:80
      ODRL_API_URL: http://mock-odrl:80
    depends_on:
      - mock-til
      - mock-tir
      - mock-ccs
      - mock-odrl

  # Mock backend services using a lightweight HTTP stub.
  # In production these are replaced by the real services.
  # Each mock returns empty collections so the UI can render.

  mock-til:
    image: nginx:alpine
    volumes:
      - ./mocks/til:/usr/share/nginx/html:ro
      - ./mocks/til-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-tir:
    image: nginx:alpine
    volumes:
      - ./mocks/tir:/usr/share/nginx/html:ro
      - ./mocks/tir-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-ccs:
    image: nginx:alpine
    volumes:
      - ./mocks/ccs:/usr/share/nginx/html:ro
      - ./mocks/ccs-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mock-odrl:
    image: nginx:alpine
    volumes:
      - ./mocks/odrl:/usr/share/nginx/html:ro
      - ./mocks/odrl-nginx.conf:/etc/nginx/conf.d/default.conf:ro
