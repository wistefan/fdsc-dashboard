server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so that proxy_pass with variables
    # does not cause nginx to abort when an upstream is temporarily unreachable.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Handle SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to mock backend services defined in docker-compose.yml

    location /api/til/ {
        set $upstream_til http://mock-til:80;
        rewrite ^/api/til/(.*) /$1 break;
        proxy_pass $upstream_til;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tir/ {
        set $upstream_tir http://mock-tir:80;
        rewrite ^/api/tir/(.*) /$1 break;
        proxy_pass $upstream_tir;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ccs/ {
        set $upstream_ccs http://mock-ccs:80;
        rewrite ^/api/ccs/(.*) /$1 break;
        proxy_pass $upstream_ccs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/odrl/ {
        set $upstream_odrl http://mock-odrl:80;
        rewrite ^/api/odrl/(.*) /$1 break;
        proxy_pass $upstream_odrl;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse-proxy passthrough to the mock Apisix Dashboard service.
    # In docker-compose, this is the mock-apisix-dashboard container
    # (Step 5 adds the service). The path is NOT rewritten — the mock
    # serves its content at /apisix-dashboard/ to match the real upstream.
    location /apisix-dashboard/ {
        set $upstream_apisix http://mock-apisix-dashboard:80;
        proxy_pass $upstream_apisix/apisix-dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Slightly larger proxy buffer to accommodate Apisix Dashboard's
        # HTML chunk sizes (default 4k/8k can cause warnings).
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
