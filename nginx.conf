server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend services (configure via env vars at deploy time)
    # These are placeholder upstreams; override in your deployment configuration.

    location /api/til/ {
        proxy_pass http://til-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tir/ {
        proxy_pass http://tir-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ccs/ {
        proxy_pass http://ccs-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/odrl/ {
        proxy_pass http://odrl-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse-proxy passthrough to the upstream Apache APISIX Dashboard.
    #
    # The path is NOT rewritten — the upstream expects to be served at
    # /apisix-dashboard/ (its default path_prefix / web_dir).
    #
    # The default upstream is http://apisix-dashboard:9000. Operators can
    # override via the APISIX_DASHBOARD_URL environment variable at container
    # start — the entrypoint script (20-render-apisix-upstream.sh) rewrites
    # this block using envsubst before nginx starts.
    #
    # Note: nginx passes through request headers (including Authorization)
    # by default, so the user's Bearer JWT reaches the upstream Apisix
    # Dashboard for SSO token verification without extra configuration.
    location /apisix-dashboard/ {
        proxy_pass ${APISIX_DASHBOARD_URL}/apisix-dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Slightly larger proxy buffer to accommodate Apisix Dashboard's
        # HTML chunk sizes (default 4k/8k can cause warnings).
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
