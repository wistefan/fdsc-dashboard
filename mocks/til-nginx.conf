server {
    listen 80;
    root /usr/share/nginx/html;
    default_type application/json;

    # Handle issuer detail requests: /issuer/{did}
    # DIDs contain colons (e.g., did:web:example.com) so we match the prefix
    # and serve a corresponding .json file.
    location ~ ^/issuer/(did:.+)$ {
        try_files /issuer/$1.json /issuer/index.json =404;
    }

    location / {
        try_files $uri $uri/index.json =404;
    }
}
