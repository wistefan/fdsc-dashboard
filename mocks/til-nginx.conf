server {
    listen 80;
    root /usr/share/nginx/html;
    default_type application/json;

    # Handle issuer collection endpoint: /issuer
    location = /issuer {
        # POST /issuer — create a new issuer (return 201 with Location header)
        if ($request_method = POST) {
            add_header Location "/issuer/did:web:new-issuer" always;
            return 201 '{"did":"did:web:new-issuer","credentials":[]}';
        }

        # GET /issuer — list all issuers
        try_files /issuer/index.json =404;
    }

    # Handle issuer detail requests: /issuer/{did}
    # DIDs contain colons (e.g., did:web:example.com) so we match the prefix
    # and serve a corresponding .json file.
    location ~ ^/issuer/(did:.+)$ {
        # PUT /issuer/{did} — update an issuer (return 200 with mock JSON)
        if ($request_method = PUT) {
            return 200 '{"did":"did:web:updated-issuer","credentials":[]}';
        }

        # DELETE /issuer/{did} — delete an issuer (return 204 No Content)
        if ($request_method = DELETE) {
            return 204;
        }

        # GET /issuer/{did} — get issuer detail
        try_files /issuer/$1.json /issuer/index.json =404;
    }

    location / {
        try_files $uri $uri/index.json =404;
    }
}
