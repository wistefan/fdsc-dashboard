server {
    listen 80;
    root /usr/share/nginx/html;

    # Serve the mock Apisix Dashboard static files at /apisix-dashboard/.
    # The real Apisix Dashboard uses this same path prefix by default, so
    # the proxy block in nginx-docker-compose.conf works without rewriting.

    location /apisix-dashboard/ {
        # Default to index.html for any sub-path (SPA-style fallback)
        try_files $uri $uri/ /apisix-dashboard/index.html;
    }

    # Echo the Authorization header back as X-Forwarded-Authorization so the
    # inline JS in index.html can display it for SSO debugging.
    location = /apisix-dashboard/health.json {
        add_header X-Forwarded-Authorization $http_authorization always;
        try_files $uri =404;
    }

    # Redirect bare /apisix-dashboard to the trailing-slash version
    location = /apisix-dashboard {
        return 301 /apisix-dashboard/;
    }
}
