server {
    listen 80;
    root /usr/share/nginx/html;
    default_type application/json;

    # Handle policy collection endpoint: /policy
    location = /policy {
        # POST /policy — create a new policy (return 201 with rego string)
        if ($request_method = POST) {
            return 201 '"package policy.new_policy\n\ndefault allow = false"';
        }

        # GET /policy — list all policies
        try_files /policy/index.json =404;
    }

    # Handle policy detail requests: /policy/{id}
    location ~ ^/policy/([^/]+)$ {
        # PUT /policy/{id} — create or update a policy (return 200 with rego string)
        if ($request_method = PUT) {
            return 200 '"package policy.updated\n\ndefault allow = false"';
        }

        # DELETE /policy/{id} — delete a policy (return 204 No Content)
        if ($request_method = DELETE) {
            return 204;
        }

        # GET /policy/{id} — get policy detail
        try_files /policy/$1/index.json =404;
    }

    # Handle service collection endpoint: /service
    location = /service {
        # POST /service — create a new service (return 201 with mock JSON)
        if ($request_method = POST) {
            return 201 '{"id":"new-service","defaultOidcScope":"default"}';
        }

        # GET /service — list all services
        try_files /service/index.json =404;
    }

    # Handle service-level policy detail: /service/{id}/policy/{policyId}
    # This must appear before the service policy collection route to match first.
    location ~ ^/service/([^/]+)/policy/([^/]+)$ {
        # PUT /service/{id}/policy/{policyId} — update a service policy
        if ($request_method = PUT) {
            return 200 '"package policy.updated\n\ndefault allow = false"';
        }

        # DELETE /service/{id}/policy/{policyId} — delete a service policy
        if ($request_method = DELETE) {
            return 204;
        }

        # GET /service/{id}/policy/{policyId} — get service policy detail
        return 200 '"package policy.$2\n\ndefault allow = false"';
    }

    # Handle service-level policy collection: /service/{id}/policy
    location ~ ^/service/([^/]+)/policy$ {
        # POST /service/{id}/policy — create a service policy
        if ($request_method = POST) {
            return 201 '"package policy.new_service_policy\n\ndefault allow = false"';
        }

        # GET /service/{id}/policy — list service policies
        try_files /service/$1/policy/index.json =404;
    }

    # Handle service detail requests: /service/{id}
    location ~ ^/service/([^/]+)$ {
        # DELETE /service/{id} — delete a service (return 204 No Content)
        if ($request_method = DELETE) {
            return 204;
        }

        # GET /service/{id} — get service detail
        try_files /service/$1/index.json =404;
    }

    location / {
        try_files $uri $uri/index.json =404;
    }
}
