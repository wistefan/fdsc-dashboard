server {
    listen 80;
    root /usr/share/nginx/html;
    default_type application/json;

    # Handle service collection endpoint: /service
    location = /service {
        # POST /service — create a new service (return 201 with Location header)
        if ($request_method = POST) {
            add_header Location "/service/new-service" always;
            return 201 '{"id":"new-service","defaultOidcScope":"default","oidcScopes":{}}';
        }

        # GET /service — list all services
        try_files /service/index.json =404;
    }

    # Handle service detail requests: /service/{id}
    location ~ ^/service/([^/]+)$ {
        # PUT /service/{id} — update a service (return 200 with mock JSON)
        if ($request_method = PUT) {
            return 200 '{"id":"updated-service","defaultOidcScope":"default","oidcScopes":{}}';
        }

        # DELETE /service/{id} — delete a service (return 204 No Content)
        if ($request_method = DELETE) {
            return 204;
        }

        # GET /service/{id} — get service detail
        try_files /service/$1/index.json =404;
    }

    location / {
        try_files $uri $uri/index.json =404;
    }
}
